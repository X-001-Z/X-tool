name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build release files
        shell: powershell
        run: .\release.ps1

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          gh release create "${{ github.ref_name }}" `
            "release/PDF2PPT-$version-win64-portable.zip" `
            "release/PDF2PPT-$version-source.zip" `
            release/SHA256SUMS.txt `
            --title "PDF2PPT ${{ github.ref_name }}" `
            --generate-notes
