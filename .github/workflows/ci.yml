name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and test
        shell: powershell
        run: .\build.ps1

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PDF2PPT-windows
          path: outputs/PDF2PPT.exe
          if-no-files-found: error
